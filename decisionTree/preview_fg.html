<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; color: #fff; font-family: sans-serif; }
  .img-container { display: inline-block; margin: 10px; text-align: center; background: #555; padding: 10px; border-radius: 5px; }
  img { max-width: 1000px; max-height: 1000px; }
</style>
</head>
<body>
<script>
  const images = [
    "../fg/Frame_143.png", "../fg/天气决策树.png"
  ];
  for (const img of images) {
    document.write(`<div class="img-container">
      <img src="${encodeURIComponent(img)}" /><br/>
      <small>${img}</small>
    </div>`);
  }
</script>
</body>
</html>
