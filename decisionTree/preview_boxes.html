<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; color: #fff; font-family: sans-serif; }
  .img-container { display: inline-block; margin: 10px; text-align: center; background: #555; padding: 10px; border-radius: 5px; }
  img { max-width: 400px; max-height: 400px; border: 1px solid red; }
</style>
</head>
<body>
<script>
  const images = [
    "box_yes.png", "box_no.png", 
    "Group 2186.png", "Group 2187.png", 
    "Group 2193.png", "Group 2194.png",
    "result_snow.png", "result_none.png"
  ];
  for (const img of images) {
    document.write(`<div class="img-container">
      <img src="image/${encodeURIComponent(img)}" /><br/>
      <small>${img}</small>
    </div>`);
  }
</script>
</body>
</html>
